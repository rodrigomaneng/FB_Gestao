<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fundação Bradesco — Gestão de Equipamentos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#CC0000;--red2:#FF2222;--rdim:rgba(204,0,0,.13);--bg:#0B0B0B;--s1:#111;--s2:#171717;--s3:#1E1E1E;--s4:#262626;--s5:#303030;--ln:rgba(255,255,255,.06);--t1:#EFEFEF;--t2:#888;--t3:#444;--g:#22C55E;--a:#F59E0B;--ff:'DM Sans',sans-serif;--fm:'DM Mono',monospace;}
html,body{height:100%;font-family:var(--ff);background:var(--bg);color:var(--t1);overflow:hidden}
#app{display:flex;height:100vh}
#sb{width:248px;min-width:248px;background:var(--s1);border-right:1px solid var(--ln);display:flex;flex-direction:column;transition:width .22s;overflow:hidden}
#sb.mini{width:50px;min-width:50px}
.sb-hd{height:58px;display:flex;align-items:center;gap:10px;padding:0 13px;border-bottom:1px solid var(--ln);flex-shrink:0}
.sb-logo{width:30px;height:30px;min-width:30px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff}
.sb-ttl{overflow:hidden;flex:1}.sb-ttl b{display:block;font-size:12px;font-weight:600;white-space:nowrap;line-height:1.3}.sb-ttl span{font-size:10px;color:var(--t3);white-space:nowrap}
#sb.mini .sb-ttl{display:none}
#sbt{background:none;border:none;color:var(--t3);cursor:pointer;padding:3px;font-size:13px;flex-shrink:0}#sbt:hover{color:var(--t1)}
.sb-scr{flex:1;overflow-y:auto;padding:6px 0 12px}.sb-scr::-webkit-scrollbar{width:3px}.sb-scr::-webkit-scrollbar-thumb{background:var(--s5);border-radius:2px}
.sb-sec{padding:12px 10px 2px}.sb-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);padding:0 3px}
#sb.mini .sb-lbl{visibility:hidden}
.sbi{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;color:var(--t2);font-size:12px;white-space:nowrap;overflow:hidden;transition:background .1s,color .1s;position:relative;margin:1px 0}
.sbi:hover{background:var(--s3);color:var(--t1)}.sbi.on{background:var(--rdim);color:var(--red2)}
.sbi.on::before{content:'';position:absolute;left:0;top:22%;height:56%;width:2px;background:var(--red);border-radius:0 2px 2px 0}
.sbi-ic{font-size:12px;min-width:16px;text-align:center}.sbi-nm{flex:1;overflow:hidden;text-overflow:ellipsis}
.sbi-pill{font-size:9px;font-family:var(--fm);font-weight:500;padding:1px 5px;border-radius:8px;min-width:30px;text-align:center}
#sb.mini .sbi-nm,#sb.mini .sbi-pill{display:none}
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{height:58px;border-bottom:1px solid var(--ln);flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 22px;background:rgba(11,11,11,.92);backdrop-filter:blur(10px)}
#crumb{font-size:12.5px;color:var(--t2);flex:1}#crumb strong{color:var(--t1);font-weight:600}
.src-wrap{position:relative}.src-wrap::before{content:'⌕';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px;pointer-events:none}
#src{background:var(--s2);border:1px solid var(--ln);border-radius:6px;padding:5px 10px 5px 26px;color:var(--t1);font-size:11.5px;font-family:var(--ff);width:200px;outline:none;transition:border .15s}
#src:focus{border-color:var(--red)}#src::placeholder{color:var(--t3)}
#pg{flex:1;overflow-y:auto;padding:24px 24px 32px}#pg::-webkit-scrollbar{width:4px}#pg::-webkit-scrollbar-thumb{background:var(--s5);border-radius:2px}
.ph{margin-bottom:22px}.ph h1{font-size:22px;font-weight:700}.ph h1 em{color:var(--red);font-style:normal}.ph p{font-size:11.5px;color:var(--t2);margin-top:4px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--s1);border:1px solid var(--ln);border-radius:8px;padding:14px 16px}
.kpi-l{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.kpi-v{font-size:24px;font-weight:700;font-family:var(--fm)}.kpi-v.g{color:var(--g)}.kpi-v.r{color:var(--red2)}.kpi-v.a{color:var(--a)}.kpi-s{font-size:10px;color:var(--t3);margin-top:2px}
.tw{background:var(--s1);border:1px solid var(--ln);border-radius:10px;overflow:hidden}
.tw-bar{padding:10px 14px;border-bottom:1px solid var(--ln);display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:44px}
.tw-ttl{font-size:12px;font-weight:600}
.chip{background:var(--s3);border:1px solid var(--ln);border-radius:16px;color:var(--t2);font-size:10px;padding:3px 9px;cursor:pointer;font-family:var(--ff);transition:all .12s}
.chip:hover{color:var(--t1);border-color:var(--t3)}.chip.on{background:var(--rdim);border-color:var(--red);color:var(--red2)}
.mla{margin-left:auto;font-size:10px;color:var(--t3);display:flex;align-items:center;gap:6px}
table{width:100%;border-collapse:collapse;font-size:11.5px}
thead th{background:var(--s2);padding:8px 12px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);border-bottom:1px solid var(--ln);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--ln);transition:background .09s}tbody tr:last-child{border-bottom:none}tbody tr:hover{background:var(--s2)}
td{padding:7px 12px;color:var(--t2);vertical-align:middle}td.lk{color:var(--t1);font-weight:500;cursor:pointer}td.lk:hover{color:var(--red2)}
.bw{display:flex;align-items:center;gap:7px}.bt{flex:1;height:4px;background:var(--s4);border-radius:2px;overflow:hidden;min-width:50px}.bf{height:100%;border-radius:2px;transition:width .35s}.bv{font-size:10px;font-family:var(--fm);font-weight:500;min-width:32px}
.tag{display:inline-block;font-size:9px;font-family:var(--fm);padding:1px 5px;border-radius:3px;background:var(--s3);border:1px solid var(--ln);color:var(--t2)}
.sh{background:linear-gradient(125deg,var(--s1) 0%,var(--s2) 100%);border:1px solid var(--ln);border-radius:10px;padding:20px 22px;margin-bottom:18px;display:flex;align-items:center;gap:18px}
.sh-av{width:48px;height:48px;min-width:48px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff}
.sh-info h2{font-size:18px;font-weight:700}.sh-meta{font-size:11px;color:var(--t2);margin-top:3px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sh-stats{display:flex;gap:20px;margin-left:auto;flex-shrink:0}.ss{text-align:center}.ss-v{font-size:18px;font-weight:700;font-family:var(--fm)}.ss-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.env-row td{background:rgba(204,0,0,.07);color:var(--red2);font-weight:600;font-size:10.5px;border-bottom:1px solid rgba(204,0,0,.15)!important}
.eq-nm{font-family:var(--fm);font-size:10.5px;color:var(--t1)}
.tg-wrap{display:flex;align-items:center;gap:7px}.tg{position:relative;width:34px;height:18px;cursor:pointer;flex-shrink:0}.tg input{opacity:0;width:0;height:0;position:absolute}
.tg-tr{position:absolute;inset:0;border-radius:9px;background:var(--s4);border:1px solid var(--ln);transition:background .18s,border .18s}
.tg input:checked~.tg-tr{background:rgba(34,197,94,.18);border-color:var(--g)}
.tg-th{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--t3);transition:transform .18s,background .18s}
.tg input:checked~.tg-tr .tg-th{transform:translateX(16px);background:var(--g)}
.tg-lb{font-size:9.5px;font-family:var(--fm);color:var(--t3);white-space:nowrap;min-width:28px}.tg-lb.ok{color:var(--g)}.tg-lb.fl{color:var(--red2)}
/* editable cells */
.editable{cursor:text;min-width:60px;position:relative;border-radius:4px;padding:3px 5px;transition:background .12s}
.editable:hover{background:var(--s3)}
.editable.edited{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);}
.editable.edited::after{content:'✎';position:absolute;top:-6px;right:-4px;font-size:8px;color:var(--a);line-height:1}
.ed-input{background:var(--s3);border:1px solid var(--red);border-radius:4px;color:var(--t1);font-size:11px;font-family:var(--ff);padding:3px 6px;width:100%;min-width:80px;outline:none;resize:none;}
.ed-hint{font-size:9px;color:var(--t3);display:block;margin-top:2px}
/* toolbar buttons */
.tbtn{background:var(--s3);border:1px solid var(--ln);border-radius:5px;color:var(--t2);font-size:10.5px;padding:4px 10px;cursor:pointer;font-family:var(--ff);transition:all .12s;white-space:nowrap}
.tbtn:hover{background:var(--s4);color:var(--t1);border-color:var(--t3)}
.tbtn.green{color:var(--g);border-color:rgba(34,197,94,.3)}.tbtn.amber{color:var(--a);border-color:rgba(245,158,11,.3)}
/* loader */
#ld{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .35s}
#ld.out{opacity:0;pointer-events:none}.ld-logo{font-size:26px;font-weight:700}.ld-logo em{color:var(--red);font-style:normal}
.ld-trk{width:240px;height:2px;background:var(--s3);border-radius:1px;overflow:hidden}.ld-bar{height:100%;width:0;background:var(--red);transition:width .28s}.ld-st{font-size:10.5px;color:var(--t3);font-family:var(--fm)}
.empty{text-align:center;padding:40px 20px;color:var(--t3)}.empty .ic{font-size:28px;margin-bottom:8px}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--s1);border:1px solid var(--ln);border-radius:12px;padding:24px;width:480px;max-width:90vw}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px}
.modal textarea{width:100%;height:200px;background:var(--s3);border:1px solid var(--ln);border-radius:6px;color:var(--t1);font-size:11px;font-family:var(--fm);padding:10px;outline:none;resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
@media(max-width:800px){#sb{width:50px;min-width:50px}.sb-ttl,.sbi-nm,.sb-lbl,.sbi-pill{display:none}.kpis{grid-template-columns:1fr 1fr}.sh{flex-wrap:wrap}.sh-stats{width:100%;justify-content:space-around;margin-left:0}#pg{padding:14px}}
</style>
</head>

var OV={},EDITS={},CUR='dashboard';
function loadLS(){

}

function saveEdits(){try{localStorage.setItem('fb_ed',JSON.stringify(EDITS));}catch(e){}}

function ec(p){if(p==null)return'#444';if(p>=95)return'#22C55E';if(p>=85)return'#84cc16';if(p>=70)return'#F59E0B';return'#F97316';}
function ebg(p){if(p==null)return'rgba(68,68,68,.1)';if(p>=95)return'rgba(34,197,94,.12)';if(p>=85)return'rgba(132,204,22,.12)';if(p>=70)return'rgba(245,158,11,.12)';return'rgba(249,115,22,.12)';}
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'-');}
function xe(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isOk(sh,ri,pend){var k=sh+'|'+ri;if(OV.hasOwnProperty(k))return OV[k];return!pend||pend===''||pend==='0';}
function getEdit(sh,ri,field){var k=sh+'|'+ri+'|'+field;return EDITS.hasOwnProperty(k)?EDITS[k]:null;}
function setEdit(sh,ri,field,val){
  var k=sh+'|'+ri+'|'+field;
  if(val===''||val===null){delete EDITS[k];}else{EDITS[k]=val;}
  saveEdits();
}
function getVal(sh,ri,field,orig){
  var ed=getEdit(sh,ri,field);
  return ed!==null?ed:orig;
}

function liveEff(s){
  var items=SD[s.sh];if(!items)return s.eff;
  var eq=items.filter(function(x){return x[1];});if(!eq.length)return s.eff;
  var ok=eq.filter(function(x,i){return isOk(s.sh,i,getVal(s.sh,i,'pending',x[2]));}).length;
  return Math.round(ok/eq.length*100);
}
function getStats(s){
  var items=SD[s.sh];
  if(!items)return{total:s.total,op:s.op,inop:s.inop,eff:s.eff};
  var eq=items.filter(function(x){return x[1];});
  var ok=eq.filter(function(x,i){return isOk(s.sh,i,getVal(s.sh,i,'pending',x[2]));}).length;
  return{total:eq.length,op:ok,inop:eq.length-ok,eff:eq.length?Math.round(ok/eq.length*100):null};
}

function countEdits(sh){
  return Object.keys(EDITS).filter(function(k){return k.indexOf(sh+'|')===0;}).length;
}

function buildSB(){
  document.getElementById('nav-schools').innerHTML=IDX.map(function(s){

}

function go(page){
  CUR=page;

  if(page==='dashboard'){
    document.getElementById('nav-dash').classList.add('on');

    renderDash(null);

    var nm=page.slice(7);
    var el=document.getElementById('nav-'+slug(nm));
    if(el)el.classList.add('on');
    document.getElementById('ct').textContent=nm;
    renderSchool(nm);
  }
}

function applyFilter(f,btn){
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});
  btn.classList.add('on');
  var fn=null;
  if(f==='100')fn=function(s){return getStats(s).eff===100;};
  else if(f==='crit')fn=function(s){var e=getStats(s).eff;return e!=null&&e<85;};
  else if(f.indexOf('spv:')===0){var spv=f.slice(4);fn=function(s){return s.spv===spv;};}
  renderDash(fn);
}

    var eTensao=getEdit(s.sh,ri,'tensao')!==null,eModel=getEdit(s.sh,ri,'model')!==null;
    var eType=getEdit(s.sh,ri,'type')!==null,eMaker=getEdit(s.sh,ri,'maker')!==null;
    var eObs=getEdit(s.sh,ri,'obs')!==null,ePend=getEdit(s.sh,ri,'pending')!==null;

    function cell(field,val,isEdited,isLong){
      if(!EDIT_MODE){
        return '<td class="'+(isEdited?'editable edited':'editable')+'" style="font-size:10.5px;color:'+(isEdited?'var(--a)':'var(--t2)')+'">'+xe(val||'—')+'</td>';
      }
      var extraStyle=isLong?'min-width:150px':'';
      return '<td style="'+extraStyle+'">'+
        '<span class="'+(isEdited?'editable edited':'editable')+'" '+
        'onclick="startEdit(this,''+s.sh+'','+ri+',''+field+'')" '+
        'id="ed-'+s.sh.replace(/[^a-z0-9]/gi,'_')+'-'+ri+'-'+field+'" '+
        'style="font-size:10.5px;color:'+(isEdited?'var(--a)':'var(--t2)')+';display:block;cursor:pointer">'+
        xe(val||'—')+'</span></td>';
    }

    html+='<tr id="er-'+ri+'">'+
      '<td style="font-size:10.5px;color:var(--t2)">'+xe(ambient||'—')+'</td>'+
      '<td class="eq-nm">'+xe(equip)+'</td>'+
      cell('tensao',vTensao,eTensao,false)+
      cell('model',vModel,eModel,false)+
      cell('type',vType,eType,false)+
      cell('maker',vMaker,eMaker,false)+
      cell('pending',vPend,ePend,true)+
      cell('obs',vObs,eObs,true)+
      '<td><div class="tg-wrap">'+
      '<label class="tg"><input type="checkbox" '+(ok?'checked':'')+
      ' onchange="toggleEq(''+s.sh.replace(/'/g,"\\'")+'',' +ri+',this.checked)">'+
      '<div class="tg-tr"><div class="tg-th"></div></div></label>'+
      '<span class="tg-lb '+(ok?'ok':'fl')+'" id="tl-'+ri+'">'+(ok?'OK':'FALHA')+'</span>'+
      '</div></td></tr>';
  });

  html+='</tbody></table>';
  body.innerHTML=html;
  if(cntEl)cntEl.innerHTML=eq.length+' equipamentos'+(EDIT_MODE?' · <span style="color:var(--a)">&#9998; clique nas células para editar</span>':'');
}

function startEdit(el,sh,ri,field){
  var cur=el.textContent==='—'?'':el.textContent;
  var isLong=(field==='obs'||field==='pending');
  var tag=isLong?'textarea':'input';
  var inp=document.createElement(tag);
  inp.className='ed-input';
  inp.value=cur;
  if(isLong){inp.rows=2;inp.style.height='54px';}
  el.style.display='none';
  el.parentNode.insertBefore(inp,el.nextSibling);
  inp.focus();inp.select();

  function save(){
    var val=inp.value.trim();
    setEdit(sh,ri,field,val);
    el.textContent=val||'—';
    el.style.color=val?'var(--a)':'var(--t2)';
    el.className=val?'editable edited':'editable';
    el.style.display='';
    if(inp.parentNode)inp.parentNode.removeChild(inp);
    // update stats if pending changed
    if(field==='pending'){
      var school=IDX.filter(function(s){return s.sh===sh;})[0];
      if(school){updStats(school);buildSB();}
    }
  }

  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!isLong){e.preventDefault();save();}
    if(e.key==='Escape'){el.style.display='';if(inp.parentNode)inp.parentNode.removeChild(inp);}
  });
}

function updStats(s){
  var st=getStats(s),c=ec(st.eff);
  var t=document.getElementById('st-t'),o=document.getElementById('st-o'),i=document.getElementById('st-i'),e=document.getElementById('st-e');
  if(t)t.textContent=st.total;if(o)o.textContent=st.op;
  if(i){i.textContent=st.inop;i.style.color=st.inop>0?'var(--red2)':'';}
  if(e){e.textContent=st.eff!=null?st.eff+'%':'—';e.style.color=c;}
}

function toggleEq(sh,ri,checked){
  OV[sh+'|'+ri]=checked;saveOv();
  var lbl=document.getElementById('tl-'+ri);
  if(lbl){lbl.textContent=checked?'OK':'FALHA';lbl.className='tg-lb '+(checked?'ok':'fl');}
  var school=IDX.filter(function(s){return s.sh===sh;})[0];
  if(!school)return;
  updStats(school);buildSB();
  if(CUR==='dashboard')renderDash(null);
}

/* EXPORT / IMPORT */
function exportEdits(){
  var data={overrides:OV,edits:EDITS,exported:new Date().toISOString()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='fb_edicoes_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}

function exportSchoolEdits(sh){
  var schEdits={};
  Object.keys(EDITS).forEach(function(k){if(k.indexOf(sh+'|')===0)schEdits[k]=EDITS[k];});
  var schOv={};
  Object.keys(OV).forEach(function(k){if(k.indexOf(sh+'|')===0)schOv[k]=OV[k];});
  var data={sh:sh,overrides:schOv,edits:schEdits,exported:new Date().toISOString()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='fb_'+sh.replace(/[^a-z0-9]/gi,'_')+'_edicoes.json';a.click();
}

function clearSchoolEdits(sh){
  if(!confirm('Limpar todas as edições de '+sh+'?'))return;
  Object.keys(EDITS).forEach(function(k){if(k.indexOf(sh+'|')===0)delete EDITS[k];});
  Object.keys(OV).forEach(function(k){if(k.indexOf(sh+'|')===0)delete OV[k];});
  saveEdits();saveOv();buildSB();
  var name=document.getElementById('ct').textContent;
  var s=IDX.filter(function(x){return x.u===name;})[0];
  if(s)renderSchool(s.u);
}

function importEdits(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(data.edits)Object.assign(EDITS,data.edits);
        if(data.overrides)Object.assign(OV,data.overrides);
        saveEdits();saveOv();buildSB();
        if(CUR==='dashboard')renderDash(null);
        else{var nm=document.getElementById('ct').textContent;var s=IDX.filter(function(x){return x.u===nm;})[0];if(s)renderSchool(s.u);}
        alert('Edições importadas com sucesso!');
      }catch(err){alert('Erro ao importar: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

document.addEventListener('keydown',function(e){
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('src').focus();}
  if(e.key==='Escape'&&!EDIT_MODE){document.getElementById('src').value='';filterSB('');document.getElementById('src').blur();}
});

(function(){
  var bar=document.getElementById('ldbar'),stat=document.getElementById('ldst'),ov=document.getElementById('ld');
  buildSB();var i=0;
  function next(){
    if(i<IDX.length){bar.style.width=Math.round(10+i/IDX.length*88)+'%';stat.textContent=IDX[i].u+'...';i++;setTimeout(next,20);}
    else{bar.style.width='100%';stat.textContent='Pronto!';buildSB();
      setTimeout(function(){ov.classList.add('out');setTimeout(function(){ov.style.display='none';go('dashboard');},400);},300);}
  }
  next();
})();
</script>
