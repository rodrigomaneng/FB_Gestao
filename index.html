<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fundação Bradesco — Gestão de Equipamentos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#CC0000;--red2:#FF2222;--rdim:rgba(204,0,0,.13);--bg:#0B0B0B;--s1:#111;--s2:#171717;--s3:#1E1E1E;--s4:#262626;--s5:#303030;--ln:rgba(255,255,255,.06);--t1:#EFEFEF;--t2:#888;--t3:#444;--g:#22C55E;--a:#F59E0B;--ff:'DM Sans',sans-serif;--fm:'DM Mono',monospace;}
html,body{height:100%;font-family:var(--ff);background:var(--bg);color:var(--t1);overflow:hidden}
#app{display:flex;height:100vh}
#sb{width:248px;min-width:248px;background:var(--s1);border-right:1px solid var(--ln);display:flex;flex-direction:column;transition:width .22s;overflow:hidden}
#sb.mini{width:50px;min-width:50px}
.sb-hd{height:58px;display:flex;align-items:center;gap:10px;padding:0 13px;border-bottom:1px solid var(--ln);flex-shrink:0}
.sb-logo{width:30px;height:30px;min-width:30px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff}
.sb-ttl{overflow:hidden;flex:1}.sb-ttl b{display:block;font-size:12px;font-weight:600;white-space:nowrap;line-height:1.3}.sb-ttl span{font-size:10px;color:var(--t3);white-space:nowrap}
#sb.mini .sb-ttl{display:none}
#sbt{background:none;border:none;color:var(--t3);cursor:pointer;padding:3px;font-size:13px;flex-shrink:0}#sbt:hover{color:var(--t1)}
.sb-scr{flex:1;overflow-y:auto;padding:6px 0 12px}.sb-scr::-webkit-scrollbar{width:3px}.sb-scr::-webkit-scrollbar-thumb{background:var(--s5);border-radius:2px}
.sb-sec{padding:12px 10px 2px}.sb-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);padding:0 3px}
#sb.mini .sb-lbl{visibility:hidden}
.sbi{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;color:var(--t2);font-size:12px;white-space:nowrap;overflow:hidden;transition:background .1s,color .1s;position:relative;margin:1px 0}
.sbi:hover{background:var(--s3);color:var(--t1)}.sbi.on{background:var(--rdim);color:var(--red2)}
.sbi.on::before{content:'';position:absolute;left:0;top:22%;height:56%;width:2px;background:var(--red);border-radius:0 2px 2px 0}
.sbi-ic{font-size:12px;min-width:16px;text-align:center}.sbi-nm{flex:1;overflow:hidden;text-overflow:ellipsis}
.sbi-pill{font-size:9px;font-family:var(--fm);font-weight:500;padding:1px 5px;border-radius:8px;min-width:30px;text-align:center}
#sb.mini .sbi-nm,#sb.mini .sbi-pill{display:none}
#mn{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tb{height:58px;border-bottom:1px solid var(--ln);flex-shrink:0;display:flex;align-items:center;gap:12px;padding:0 22px;background:rgba(11,11,11,.92);backdrop-filter:blur(10px)}
#crumb{font-size:12.5px;color:var(--t2);flex:1}#crumb strong{color:var(--t1);font-weight:600}
.src-wrap{position:relative}.src-wrap::before{content:'⌕';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px;pointer-events:none}
#src{background:var(--s2);border:1px solid var(--ln);border-radius:6px;padding:5px 10px 5px 26px;color:var(--t1);font-size:11.5px;font-family:var(--ff);width:200px;outline:none;transition:border .15s}
#src:focus{border-color:var(--red)}#src::placeholder{color:var(--t3)}
#pg{flex:1;overflow-y:auto;padding:24px 24px 32px}#pg::-webkit-scrollbar{width:4px}#pg::-webkit-scrollbar-thumb{background:var(--s5);border-radius:2px}
.ph{margin-bottom:22px}.ph h1{font-size:22px;font-weight:700}.ph h1 em{color:var(--red);font-style:normal}.ph p{font-size:11.5px;color:var(--t2);margin-top:4px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--s1);border:1px solid var(--ln);border-radius:8px;padding:14px 16px}
.kpi-l{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.kpi-v{font-size:24px;font-weight:700;font-family:var(--fm)}.kpi-v.g{color:var(--g)}.kpi-v.r{color:var(--red2)}.kpi-v.a{color:var(--a)}.kpi-s{font-size:10px;color:var(--t3);margin-top:2px}
.tw{background:var(--s1);border:1px solid var(--ln);border-radius:10px;overflow:hidden}
.tw-bar{padding:10px 14px;border-bottom:1px solid var(--ln);display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:44px}
.tw-ttl{font-size:12px;font-weight:600}
.chip{background:var(--s3);border:1px solid var(--ln);border-radius:16px;color:var(--t2);font-size:10px;padding:3px 9px;cursor:pointer;font-family:var(--ff);transition:all .12s}
.chip:hover{color:var(--t1);border-color:var(--t3)}.chip.on{background:var(--rdim);border-color:var(--red);color:var(--red2)}
.mla{margin-left:auto;font-size:10px;color:var(--t3);display:flex;align-items:center;gap:6px}
table{width:100%;border-collapse:collapse;font-size:11.5px}
thead th{background:var(--s2);padding:8px 12px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);border-bottom:1px solid var(--ln);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--ln);transition:background .09s}tbody tr:last-child{border-bottom:none}tbody tr:hover{background:var(--s2)}
td{padding:7px 12px;color:var(--t2);vertical-align:middle}td.lk{color:var(--t1);font-weight:500;cursor:pointer}td.lk:hover{color:var(--red2)}
.bw{display:flex;align-items:center;gap:7px}.bt{flex:1;height:4px;background:var(--s4);border-radius:2px;overflow:hidden;min-width:50px}.bf{height:100%;border-radius:2px;transition:width .35s}.bv{font-size:10px;font-family:var(--fm);font-weight:500;min-width:32px}
.tag{display:inline-block;font-size:9px;font-family:var(--fm);padding:1px 5px;border-radius:3px;background:var(--s3);border:1px solid var(--ln);color:var(--t2)}
.sh{background:linear-gradient(125deg,var(--s1) 0%,var(--s2) 100%);border:1px solid var(--ln);border-radius:10px;padding:20px 22px;margin-bottom:18px;display:flex;align-items:center;gap:18px}
.sh-av{width:48px;height:48px;min-width:48px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff}
.sh-info h2{font-size:18px;font-weight:700}.sh-meta{font-size:11px;color:var(--t2);margin-top:3px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.sh-stats{display:flex;gap:20px;margin-left:auto;flex-shrink:0}.ss{text-align:center}.ss-v{font-size:18px;font-weight:700;font-family:var(--fm)}.ss-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-top:1px}
.env-row td{background:rgba(204,0,0,.07);color:var(--red2);font-weight:600;font-size:10.5px;border-bottom:1px solid rgba(204,0,0,.15)!important}
.eq-nm{font-family:var(--fm);font-size:10.5px;color:var(--t1)}
.tg-wrap{display:flex;align-items:center;gap:7px}.tg{position:relative;width:34px;height:18px;cursor:pointer;flex-shrink:0}.tg input{opacity:0;width:0;height:0;position:absolute}
.tg-tr{position:absolute;inset:0;border-radius:9px;background:var(--s4);border:1px solid var(--ln);transition:background .18s,border .18s}
.tg input:checked~.tg-tr{background:rgba(34,197,94,.18);border-color:var(--g)}
.tg-th{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--t3);transition:transform .18s,background .18s}
.tg input:checked~.tg-tr .tg-th{transform:translateX(16px);background:var(--g)}
.tg-lb{font-size:9.5px;font-family:var(--fm);color:var(--t3);white-space:nowrap;min-width:28px}.tg-lb.ok{color:var(--g)}.tg-lb.fl{color:var(--red2)}
/* editable cells */
.editable{cursor:text;min-width:60px;position:relative;border-radius:4px;padding:3px 5px;transition:background .12s}
.editable:hover{background:var(--s3)}
.editable.edited{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);}
.editable.edited::after{content:'✎';position:absolute;top:-6px;right:-4px;font-size:8px;color:var(--a);line-height:1}
.ed-input{background:var(--s3);border:1px solid var(--red);border-radius:4px;color:var(--t1);font-size:11px;font-family:var(--ff);padding:3px 6px;width:100%;min-width:80px;outline:none;resize:none;}
.ed-hint{font-size:9px;color:var(--t3);display:block;margin-top:2px}
/* toolbar buttons */
.tbtn{background:var(--s3);border:1px solid var(--ln);border-radius:5px;color:var(--t2);font-size:10.5px;padding:4px 10px;cursor:pointer;font-family:var(--ff);transition:all .12s;white-space:nowrap}
.tbtn:hover{background:var(--s4);color:var(--t1);border-color:var(--t3)}
.tbtn.green{color:var(--g);border-color:rgba(34,197,94,.3)}.tbtn.amber{color:var(--a);border-color:rgba(245,158,11,.3)}
/* loader */
#ld{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .35s}
#ld.out{opacity:0;pointer-events:none}.ld-logo{font-size:26px;font-weight:700}.ld-logo em{color:var(--red);font-style:normal}
.ld-trk{width:240px;height:2px;background:var(--s3);border-radius:1px;overflow:hidden}.ld-bar{height:100%;width:0;background:var(--red);transition:width .28s}.ld-st{font-size:10.5px;color:var(--t3);font-family:var(--fm)}
.empty{text-align:center;padding:40px 20px;color:var(--t3)}.empty .ic{font-size:28px;margin-bottom:8px}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--s1);border:1px solid var(--ln);border-radius:12px;padding:24px;width:480px;max-width:90vw}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px}
.modal textarea{width:100%;height:200px;background:var(--s3);border:1px solid var(--ln);border-radius:6px;color:var(--t1);font-size:11px;font-family:var(--fm);padding:10px;outline:none;resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
@media(max-width:800px){#sb{width:50px;min-width:50px}.sb-ttl,.sbi-nm,.sb-lbl,.sbi-pill{display:none}.kpis{grid-template-columns:1fr 1fr}.sh{flex-wrap:wrap}.sh-stats{width:100%;justify-content:space-around;margin-left:0}#pg{padding:14px}}
</style>
</head>
<body>
<div id="ld"><div class="ld-logo">Fundação <em>Bradesco</em></div><div class="ld-trk"><div class="ld-bar" id="ldbar"></div></div><div class="ld-st" id="ldst">Conectando à planilha...</div></div>
<div id="app"><nav id="sb"><div class="sb-hd"><div class="sb-logo">FB</div><div class="sb-ttl"><b>Fundação Bradesco</b><span>Gestão · Maneng</span></div><button id="sbt">&#9776;</button></div><div class="sb-scr"><div class="sb-sec"><div class="sb-lbl">Geral</div><div class="sbi on" id="nav-dash" onclick="go('dashboard')"><span class="sbi-ic">&#9638;</span><span class="sbi-nm">Dashboard</span></div></div><div class="sb-sec"><div class="sb-lbl">Escolas</div><div id="nav-schools"></div></div></div></nav><main id="mn"><div id="tb"><div id="crumb">Base de Dados &middot; <strong id="ct">Dashboard</strong></div><span id="srcbadge" style="font-size:10px;font-family:var(--fm);display:flex;align-items:center;gap:5px;white-space:nowrap"></span><button onclick="refreshData(true)" id="rfbtn" title="Recarregar dados da planilha" style="background:var(--s2);border:1px solid var(--ln);border-radius:6px;color:var(--t2);font-size:11px;padding:5px 10px;cursor:pointer;font-family:var(--ff)">&#8635; Atualizar</button><div class="src-wrap"><input id="src" type="text" placeholder="Buscar escola... &#8984;K" oninput="filterSB(this.value)"></div></div><div id="pg"></div></main></div>
<script>
/* ================= FONTE DE DADOS =================
   Planilha Google (compartilhada como "qualquer pessoa com o link pode ver").
   O site lê as abas ao vivo via API gviz — igual conceito do status-leroy-maneng,
   mas sem snapshot manual: sempre direto da planilha. */
var SHEET_ID='1iQvwSCbCGSIxaf_q84IjbKNkwVegHegFzHzNkR38YTw';

/* Registro das escolas: u=nome, spv=supervisor, uf, sh=nome da ABA na planilha.
   total/op/inop/eff = último valor conhecido (fallback se ficar sem conexão). */
var IDX=[
{u:"Macapá",spv:"Rodrigo Rogério",uf:"AP",total:94,op:58,inop:36,eff:62,sh:"MACAPÁ"},
{u:"Cacoal",spv:"Rodrigo Rogério",uf:"RO",total:77,op:67,inop:10,eff:87,sh:"CACOAL"},
{u:"Paragominas",spv:"Rodrigo Rogério",uf:"PA",total:56,op:49,inop:7,eff:88,sh:"PARAGOMINAS"},
{u:"Conceição Araguaia",spv:"Rodrigo Rogério",uf:"PA",total:55,op:54,inop:1,eff:98,sh:"CONC. ARAGUAIA"},
{u:"Rio Branco",spv:"Rodrigo Rogério",uf:"AC",total:89,op:89,inop:0,eff:100,sh:"RIO BRANCO"},
{u:"Boa Vista",spv:"Rodrigo Rogério",uf:"RR",total:62,op:62,inop:0,eff:100,sh:"BOA VISTA"},
{u:"Manaus",spv:"Rodrigo Rogério",uf:"AM",total:67,op:66,inop:1,eff:99,sh:"MANAUS"},
{u:"Campinas",spv:"Rodrigo Rogério",uf:"SP",total:87,op:85,inop:2,eff:98,sh:"CAMPINAS"},
{u:"Marília",spv:"Rodrigo Rogério",uf:"SP",total:77,op:75,inop:2,eff:97,sh:"MARÍLIA"},
{u:"JD. Conceição",spv:"Rodrigo Rogério",uf:"SP",total:49,op:49,inop:0,eff:100,sh:"JD. CONCEIÇÃO"},
{u:"Registro",spv:"Rodrigo Rogério",uf:"SP",total:66,op:66,inop:0,eff:100,sh:"REGISTRO"},
{u:"Osasco I",spv:"Rodrigo Rogério",uf:"SP",total:173,op:161,inop:12,eff:93,sh:"OSASCO I"},
{u:"Osasco II",spv:"Rodrigo Rogério",uf:"SP",total:147,op:147,inop:0,eff:100,sh:"OSASCO II"},
{u:"Ceilândia",spv:"Franckllyn Moreira",uf:"DF",total:99,op:91,inop:8,eff:92,sh:"CEILÂNDIA"},
{u:"Aparecida de Goiânia",spv:"Franckllyn Moreira",uf:"DF",total:78,op:78,inop:0,eff:100,sh:"APARECIDA DE GOIÂNIA"},
{u:"Fazenda Canuanã",spv:"Franckllyn Moreira",uf:"TO",total:162,op:134,inop:28,eff:83,sh:"FAZENDA CANUANÃ"},
{u:"Bodoquena",spv:"Vagner Tiburtino",uf:"MS",total:123,op:119,inop:4,eff:97,sh:"BODOQUENA"},
{u:"Itajubá",spv:"Edwilder Costa",uf:"MG",total:62,op:62,inop:0,eff:100,sh:"ITAJUBÁ"},
{u:"São João Del Rei",spv:"Edwilder Costa",uf:"MG",total:82,op:82,inop:0,eff:100,sh:"SÃO JOÃO DEL REI"},
{u:"Rio de Janeiro",spv:"Flavio Bezerra",uf:"RJ",total:112,op:112,inop:0,eff:100,sh:"RIO DE JANEIRO"},
{u:"Vila Velha",spv:"Bruno Silva",uf:"ES",total:62,op:62,inop:0,eff:100,sh:"VILA VELHA"},
{u:"Cuiabá",spv:"Rodrigo Rogério",uf:"MT",total:72,op:72,inop:0,eff:100,sh:"CUIABÁ"}
];

var LIVE={};          // dados ao vivo por aba: {eq:[{a,e,st,pend,btu,fab,mod,obs,env}]}
var LAST_SYNC=null;   // Date da última sincronização
var LIVE_OK=0;        // quantas abas carregaram
var OV={},EDITS={},CUR='dashboard',EDIT_MODE=false;

function loadLS(){
  try{OV=JSON.parse(localStorage.getItem('fb_ov')||'{}');}catch(e){OV={};}
  try{EDITS=JSON.parse(localStorage.getItem('fb_ed')||'{}');}catch(e){EDITS={};}
}
function saveOv(){try{localStorage.setItem('fb_ov',JSON.stringify(OV));}catch(e){}}
function saveEdits(){try{localStorage.setItem('fb_ed',JSON.stringify(EDITS));}catch(e){}}
loadLS();

/* ================= LEITURA DA PLANILHA ================= */
function gvizUrl(tab){
  return 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&headers=0&sheet='+encodeURIComponent(tab);
}
function parseGviz(txt){
  var i=txt.indexOf('(');var j=txt.lastIndexOf(')');
  if(i<0||j<0)throw new Error('resposta inválida');
  var o=JSON.parse(txt.substring(i+1,j));
  if(o.status==='error')throw new Error('gviz: '+(o.errors&&o.errors[0]?o.errors[0].reason:'erro'));
  return (o.table.rows||[]).map(function(r){
    return (r.c||[]).map(function(c){
      if(!c)return'';
      var v=(c.f!==undefined&&c.f!==null)?c.f:c.v;
      return (v===null||v===undefined)?'':String(v).trim();
    });
  });
}
function parseTab(rows){
  var eq=[];
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var a=(r[1]||'').replace(/#REF!\s*/gi,'').trim();
    var e=(r[2]||'').trim();
    var na=a.toUpperCase(),ne=e.toUpperCase();
    if(na.indexOf('AMBIENTE')>-1&&ne.indexOf('EQUIPAMENTO')>-1)continue;            // cabeçalho
    if(na==='RESUMO STATUS'||na==='SISTEMAS'||na==='TOTAL'||na==='FUNCIONANDO'||
       na==='CIRCUITOS PARADOS'||ne==='QUANT')break;                                 // rodapé resumo
    if(!a&&!e)continue;
    if(a&&!e){eq.push({a:a,e:'',st:'',pend:'',btu:'',fab:'',mod:'',obs:'',env:true});continue;}
    var st=(r[3]||'').trim();
    if(st!==''&&st!=='0'&&st!=='1'){var n=parseFloat(st);st=isNaN(n)?'':(n>0?'1':'0');}
    eq.push({a:a,e:e,st:st,pend:(r[4]||'').trim(),btu:(r[7]||'').trim(),
             fab:(r[8]||'').trim(),mod:(r[9]||'').trim(),obs:(r[10]||'').trim()});
  }
  return eq;
}
function fetchTab(s){
  return fetch(gvizUrl(s.sh)).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.text();
  }).then(function(t){
    var eq=parseTab(parseGviz(t));
    if(!eq.filter(function(x){return x.e;}).length)throw new Error('aba vazia');
    LIVE[s.sh]={eq:eq};
  });
}
function refreshData(manual){
  var btn=document.getElementById('rfbtn');
  if(btn){btn.disabled=true;btn.textContent='⟳ Carregando...';}
  var done=0;LIVE_OK=0;
  var jobs=IDX.map(function(s){
    return fetchTab(s).then(function(){LIVE_OK++;}).catch(function(){})
      .then(function(){
        done++;
        var bar=document.getElementById('ldbar'),st=document.getElementById('ldst');
        if(bar&&!LAST_SYNC){bar.style.width=Math.round(done/IDX.length*100)+'%';}
        if(st&&!LAST_SYNC){st.textContent=s.u+'...';}
      });
  });
  return Promise.all(jobs).then(function(){
    LAST_SYNC=new Date();
    updBadge();buildSB();
    if(btn){btn.disabled=false;btn.innerHTML='&#8635; Atualizar';}
    if(CUR==='dashboard')renderDash(null);
    else if(CUR.indexOf('school:')===0)renderSchool(CUR.slice(7));
  });
}
function updBadge(){
  var b=document.getElementById('srcbadge');if(!b)return;
  var hh=LAST_SYNC?LAST_SYNC.toTimeString().slice(0,5):'—';
  if(LIVE_OK===IDX.length){
    b.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:var(--g);display:inline-block"></span><span style="color:var(--t2)">planilha ao vivo · '+hh+'</span>';
  }else if(LIVE_OK>0){
    b.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:var(--a);display:inline-block"></span><span style="color:var(--t2)">'+LIVE_OK+'/'+IDX.length+' abas · '+hh+'</span>';
  }else{
    b.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:var(--red2);display:inline-block"></span><span style="color:var(--t2)">sem conexão · último valor conhecido</span>';
  }
}

/* ================= HELPERS ================= */
function ec(p){if(p==null)return'#444';if(p>=95)return'#22C55E';if(p>=85)return'#84cc16';if(p>=70)return'#F59E0B';return'#F97316';}
function ebg(p){if(p==null)return'rgba(68,68,68,.1)';if(p>=95)return'rgba(34,197,94,.12)';if(p>=85)return'rgba(132,204,22,.12)';if(p>=70)return'rgba(245,158,11,.12)';return'rgba(249,115,22,.12)';}
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'-');}
function xe(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isOk(sh,ri,item){
  var k=sh+'|'+ri;
  if(OV.hasOwnProperty(k))return OV[k];
  return item.st!=='0';
}
function getEdit(sh,ri,f){var k=sh+'|'+ri+'|'+f;return EDITS.hasOwnProperty(k)?EDITS[k]:null;}
function setEdit(sh,ri,f,val){
  var k=sh+'|'+ri+'|'+f;
  if(val===''||val===null){delete EDITS[k];}else{EDITS[k]=val;}
  saveEdits();
}
function getVal(sh,ri,f,orig){var ed=getEdit(sh,ri,f);return ed!==null?ed:orig;}
function countEdits(sh){return Object.keys(EDITS).filter(function(k){return k.indexOf(sh+'|')===0;}).length;}

function getStats(s){
  var L=LIVE[s.sh];
  if(L){
    var eq=L.eq.filter(function(x){return x.e;});
    var ok=0;
    for(var i=0;i<eq.length;i++)if(isOk(s.sh,i,eq[i]))ok++;
    return{total:eq.length,op:ok,inop:eq.length-ok,eff:eq.length?Math.round(ok/eq.length*100):null,live:true};
  }
  return{total:s.total,op:s.op,inop:s.inop,eff:s.eff,live:false};
}

/* ================= SIDEBAR / NAV ================= */
function buildSB(){
  document.getElementById('nav-schools').innerHTML=IDX.map(function(s){
    var st=getStats(s),p=st.eff,c=ec(p),b=ebg(p);
    var edCnt=countEdits(s.sh);
    return '<div class="sbi" id="nav-'+slug(s.u)+'" onclick="go(\'school:'+s.u.replace(/'/g,"\\'")+'\')">'+
      '<span class="sbi-ic">'+(st.live?'&#9643;':'&#9888;')+'</span>'+
      '<span class="sbi-nm">'+s.u+(edCnt?'<span style="color:var(--a);font-size:8px;margin-left:3px">✎'+edCnt+'</span>':'')+'</span>'+
      '<span class="sbi-pill" style="color:'+c+';background:'+b+'">'+(p!=null?p+'%':'—')+'</span>'+
      '</div>';
  }).join('');
  if(CUR.indexOf('school:')===0){
    var el=document.getElementById('nav-'+slug(CUR.slice(7)));
    if(el)el.classList.add('on');
  }else{document.getElementById('nav-dash').classList.add('on');}
}
document.getElementById('sbt').onclick=function(){document.getElementById('sb').classList.toggle('mini');};

function go(page){
  CUR=page;
  document.querySelectorAll('.sbi').forEach(function(e){e.classList.remove('on');});
  document.getElementById('pg').scrollTop=0;
  if(page==='dashboard'){
    document.getElementById('nav-dash').classList.add('on');
    document.getElementById('ct').textContent='Dashboard';
    renderDash(null);
  }else if(page.indexOf('school:')===0){
    var nm=page.slice(7);
    var el=document.getElementById('nav-'+slug(nm));
    if(el)el.classList.add('on');
    document.getElementById('ct').textContent=nm;
    renderSchool(nm);
  }
}
function filterSB(q){
  document.querySelectorAll('#nav-schools .sbi').forEach(function(el){
    el.style.display=el.textContent.toLowerCase().indexOf(q.toLowerCase())>-1?'':'none';
  });
}

/* ================= DASHBOARD ================= */
function renderDash(filterFn){
  var data=filterFn?IDX.filter(filterFn):IDX;
  var tT=0,tO=0,tI=0,eS=0,eC=0,f100=0,crit=0;
  data.forEach(function(s){
    var st=getStats(s);tT+=st.total;tO+=st.op;tI+=st.inop;
    if(st.eff!=null){eS+=st.eff;eC++;if(st.eff===100)f100++;if(st.eff<85)crit++;}
  });
  var avg=eC?Math.round(eS/eC):null;
  var supvs=IDX.reduce(function(a,s){if(a.indexOf(s.spv)<0)a.push(s.spv);return a;},[]).sort();

  var rows=data.map(function(s){
    var st=getStats(s),pct=st.eff,c=ec(pct),lbl=pct!=null?pct+'%':'—',pn=pct||0;
    var edCnt=countEdits(s.sh);
    return '<tr>'+
      '<td style="color:var(--t3);font-family:var(--fm);font-size:10px">'+String(IDX.indexOf(s)+1).padStart(2,'0')+'</td>'+
      '<td class="lk" onclick="go(\'school:'+s.u.replace(/'/g,"\\'")+'\')">'+s.u+
        (st.live?'':' <span title="sem conexão — último valor conhecido" style="color:var(--a);font-size:9px">&#9888;</span>')+
        (edCnt?'<span style="color:var(--a);font-size:9px;margin-left:5px">✎'+edCnt+'</span>':'')+'</td>'+
      '<td><span class="tag">'+s.uf+'</span></td>'+
      '<td style="font-size:11px">'+s.spv+'</td>'+
      '<td style="font-family:var(--fm)">'+st.total+'</td>'+
      '<td style="font-family:var(--fm);color:var(--g)">'+st.op+'</td>'+
      '<td style="font-family:var(--fm);color:'+(st.inop>0?'var(--red2)':'var(--t3)')+'">'+st.inop+'</td>'+
      '<td style="min-width:120px"><div class="bw"><div class="bt"><div class="bf" style="width:'+pn+'%;background:'+c+'"></div></div><span class="bv" style="color:'+c+'">'+lbl+'</span></div></td>'+
      '</tr>';
  }).join('');

  var chipsSPV=supvs.map(function(sv){
    return '<button class="chip" onclick="applyFilter(\'spv:'+sv.replace(/'/g,"\\'")+'\',this)">'+sv.split(' ')[0]+'</button>';
  }).join('');
  var totalEdits=Object.keys(EDITS).length;
  var fonte=LIVE_OK===IDX.length?'dados ao vivo da planilha Google':(LIVE_OK>0?LIVE_OK+' de '+IDX.length+' abas ao vivo':'sem conexão · exibindo último valor conhecido');

  document.getElementById('pg').innerHTML=
    '<div class="ph"><h1>Escolas Fundação <em>Bradesco</em></h1><p>'+IDX.length+' unidades · '+fonte+(LAST_SYNC?' · sincronizado às '+LAST_SYNC.toTimeString().slice(0,5):'')+'</p></div>'+
    '<div class="kpis">'+
    '<div class="kpi"><div class="kpi-l">Total Equipamentos</div><div class="kpi-v">'+tT.toLocaleString('pt-BR')+'</div><div class="kpi-s">na base de dados</div></div>'+
    '<div class="kpi"><div class="kpi-l">Em Operação</div><div class="kpi-v g">'+tO.toLocaleString('pt-BR')+'</div><div class="kpi-s">'+(tT?Math.round(tO/tT*100):0)+'% do total</div></div>'+
    '<div class="kpi"><div class="kpi-l">Inoperantes</div><div class="kpi-v r">'+tI.toLocaleString('pt-BR')+'</div><div class="kpi-s">'+crit+' escolas críticas</div></div>'+
    '<div class="kpi"><div class="kpi-l">Eficiência Média</div><div class="kpi-v a">'+(avg!=null?avg+'%':'—')+'</div><div class="kpi-s">'+f100+' escolas em 100%</div></div>'+
    '</div>'+
    '<div class="tw">'+
    '<div class="tw-bar"><div class="tw-ttl">Índice de Eficiência</div>'+
    '<button class="chip on" onclick="applyFilter(\'all\',this)">Todas</button>'+
    '<button class="chip" onclick="applyFilter(\'100\',this)">100%</button>'+
    '<button class="chip" onclick="applyFilter(\'crit\',this)">&lt;85%</button>'+
    chipsSPV+
    '<span class="mla">'+
    '<button class="tbtn amber" onclick="exportEdits()" title="Exportar todas as edições como JSON">&#8595; Exportar edições</button>'+
    '<button class="tbtn" onclick="importEdits()" title="Importar edições de JSON">&#8593; Importar</button>'+
    (totalEdits?'<span style="color:var(--a);font-size:10px">✎ '+totalEdits+' edições</span>':'')+
    '</span></div>'+
    '<table><thead><tr><th>#</th><th>Unidade</th><th>UF</th><th>Supervisor</th><th>Total</th><th>OK</th><th>Falha</th><th>Eficiência</th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>';
}
function applyFilter(f,btn){
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});
  btn.classList.add('on');
  var fn=null;
  if(f==='100')fn=function(s){return getStats(s).eff===100;};
  else if(f==='crit')fn=function(s){var e=getStats(s).eff;return e!=null&&e<85;};
  else if(f.indexOf('spv:')===0){var spv=f.slice(4);fn=function(s){return s.spv===spv;};}
  renderDash(fn);
}

/* ================= PÁGINA DA ESCOLA ================= */
function renderSchool(name){
  var s=IDX.filter(function(x){return x.u===name;})[0];
  if(!s)return;
  var init=name.split(' ').map(function(w){return w[0]||'';}).filter(Boolean).slice(0,2).join('').toUpperCase();
  var st=getStats(s),c=ec(st.eff);
  var edCnt=countEdits(s.sh);

  document.getElementById('pg').innerHTML=
    '<div class="sh">'+
    '<div class="sh-av">'+init+'</div>'+
    '<div class="sh-info"><h2>'+s.u+'</h2>'+
    '<div class="sh-meta"><span>&#128506; '+s.uf+'</span><span>&#128100; '+s.spv+'</span>'+
    '<span style="color:'+(st.live?'var(--g)':'var(--a)')+';font-size:10px">'+(st.live?'● aba "'+s.sh+'" ao vivo':'&#9888; sem conexão — último valor conhecido')+'</span>'+
    (edCnt?'<span style="color:var(--a);font-size:10px">✎ '+edCnt+' edições locais</span>':'')+
    '</div></div>'+
    '<div class="sh-stats">'+
    '<div class="ss"><div class="ss-v" id="st-t">'+st.total+'</div><div class="ss-l">Total</div></div>'+
    '<div class="ss"><div class="ss-v" id="st-o" style="color:var(--g)">'+st.op+'</div><div class="ss-l">Operando</div></div>'+
    '<div class="ss"><div class="ss-v" id="st-i" style="color:'+(st.inop>0?'var(--red2)':'')+'">'+st.inop+'</div><div class="ss-l">Inoperante</div></div>'+
    '<div class="ss"><div class="ss-v" id="st-e" style="color:'+c+'">'+(st.eff!=null?st.eff+'%':'—')+'</div><div class="ss-l">Eficiência</div></div>'+
    '</div></div>'+
    '<div class="tw">'+
    '<div class="tw-bar">'+
    '<div class="tw-ttl">Equipamentos e Status</div>'+
    '<button class="tbtn" onclick="toggleEditMode()" id="edit-mode-btn">&#9998; Modo Edição</button>'+
    '<button class="tbtn amber" onclick="exportSchoolEdits(\''+s.sh.replace(/'/g,"\\'")+'\')" style="display:'+(edCnt?'':'none')+'" id="export-school-btn">&#8595; Exportar</button>'+
    (edCnt?'<button class="tbtn" onclick="clearSchoolEdits(\''+s.sh.replace(/'/g,"\\'")+'\')" style="color:var(--red2);border-color:rgba(255,34,34,.2)">&#215; Limpar edições</button>':'')+
    '<span class="mla" id="eq-cnt"></span>'+
    '</div>'+
    '<div id="eq-body"></div></div>';

  renderEquipTable(s);
}

function toggleEditMode(){
  EDIT_MODE=!EDIT_MODE;
  var btn=document.getElementById('edit-mode-btn');
  if(btn){
    btn.style.background=EDIT_MODE?'var(--rdim)':'';
    btn.style.color=EDIT_MODE?'var(--red2)':'';
    btn.style.borderColor=EDIT_MODE?'var(--red)':'';
    btn.textContent=EDIT_MODE?'✓ Editando...':'✎ Modo Edição';
  }
  var name=document.getElementById('ct').textContent;
  var s=IDX.filter(function(x){return x.u===name;})[0];
  if(s)renderEquipTable(s);
}

function renderEquipTable(s){
  var body=document.getElementById('eq-body');
  var cntEl=document.getElementById('eq-cnt');
  var L=LIVE[s.sh];
  if(!L){
    body.innerHTML='<div class="empty"><div class="ic">&#128268;</div><p>Sem conexão com a planilha.<br>A lista de equipamentos aparece quando a aba "'+xe(s.sh)+'" for carregada.<br><button class="tbtn" onclick="refreshData(true)" style="margin-top:10px">&#8635; Tentar novamente</button></p></div>';
    if(cntEl)cntEl.textContent='';
    return;
  }
  var items=L.eq;
  var eq=items.filter(function(x){return x.e;});

  var html='<table><thead><tr>'+
    '<th style="min-width:130px">Ambiente</th>'+
    '<th style="min-width:110px">Equipamento</th>'+
    '<th style="min-width:80px">BTU/h</th>'+
    '<th style="min-width:100px">Fabricante</th>'+
    '<th style="min-width:100px">Modelo</th>'+
    '<th style="min-width:150px">Pendência</th>'+
    '<th style="min-width:140px">Observações</th>'+
    '<th style="min-width:90px">Status</th>'+
    '</tr></thead><tbody>';

  var eqIdx=0;
  items.forEach(function(item){
    if(item.env){
      html+='<tr class="env-row"><td colspan="8" style="padding-left:14px">&#9658; '+xe(item.a)+'</td></tr>';
      return;
    }
    var ri=eqIdx++;
    var vBtu=getVal(s.sh,ri,'btu',item.btu);
    var vFab=getVal(s.sh,ri,'fab',item.fab);
    var vMod=getVal(s.sh,ri,'mod',item.mod);
    var vPend=getVal(s.sh,ri,'pend',item.pend);
    var vObs=getVal(s.sh,ri,'obs',item.obs);
    var ok=isOk(s.sh,ri,item);
    var ovr=OV.hasOwnProperty(s.sh+'|'+ri);

    function cell(field,val,isLong){
      var isEdited=getEdit(s.sh,ri,field)!==null;
      if(!EDIT_MODE){
        return '<td style="font-size:10.5px;color:'+(isEdited?'var(--a)':'var(--t2)')+'">'+xe(val||'—')+'</td>';
      }
      return '<td style="'+(isLong?'min-width:150px':'')+'">'+
        '<span class="'+(isEdited?'editable edited':'editable')+'" '+
        'onclick="startEdit(this,\''+s.sh.replace(/'/g,"\\'")+'\','+ri+',\''+field+'\')" '+
        'style="font-size:10.5px;color:'+(isEdited?'var(--a)':'var(--t2)')+';display:block;cursor:pointer">'+
        xe(val||'—')+'</span></td>';
    }

    html+='<tr id="er-'+ri+'">'+
      '<td style="font-size:10.5px;color:var(--t2)">'+xe(item.a||'—')+'</td>'+
      '<td class="eq-nm">'+xe(item.e)+'</td>'+
      cell('btu',vBtu,false)+
      cell('fab',vFab,false)+
      cell('mod',vMod,false)+
      cell('pend',vPend,true)+
      cell('obs',vObs,true)+
      '<td><div class="tg-wrap">'+
      '<label class="tg"><input type="checkbox" '+(ok?'checked':'')+
      ' onchange="toggleEq(\''+s.sh.replace(/'/g,"\\'")+'\','+ri+',this.checked)">'+
      '<div class="tg-tr"><div class="tg-th"></div></div></label>'+
      '<span class="tg-lb '+(ok?'ok':'fl')+'" id="tl-'+ri+'">'+(ok?'OK':'FALHA')+(ovr?' *':'')+'</span>'+
      '</div></td></tr>';
  });

  html+='</tbody></table>';
  body.innerHTML=html;
  if(cntEl)cntEl.innerHTML=eq.length+' equipamentos'+(EDIT_MODE?' · <span style="color:var(--a)">&#9998; clique nas células para editar</span>':' · status vindo da planilha; * = alterado localmente');
}

function startEdit(el,sh,ri,field){
  var cur=el.textContent==='—'?'':el.textContent;
  var isLong=(field==='obs'||field==='pend');
  var tag=isLong?'textarea':'input';
  var inp=document.createElement(tag);
  inp.className='ed-input';
  inp.value=cur;
  if(isLong){inp.rows=2;inp.style.height='54px';}
  el.style.display='none';
  el.parentNode.insertBefore(inp,el.nextSibling);
  inp.focus();inp.select();
  function save(){
    var val=inp.value.trim();
    setEdit(sh,ri,field,val);
    el.textContent=val||'—';
    el.style.color=val?'var(--a)':'var(--t2)';
    el.className=val?'editable edited':'editable';
    el.style.display='';
    if(inp.parentNode)inp.parentNode.removeChild(inp);
  }
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!isLong){e.preventDefault();save();}
    if(e.key==='Escape'){el.style.display='';if(inp.parentNode)inp.parentNode.removeChild(inp);}
  });
}

function updStats(s){
  var st=getStats(s),c=ec(st.eff);
  var t=document.getElementById('st-t'),o=document.getElementById('st-o'),i=document.getElementById('st-i'),e=document.getElementById('st-e');
  if(t)t.textContent=st.total;if(o)o.textContent=st.op;
  if(i){i.textContent=st.inop;i.style.color=st.inop>0?'var(--red2)':'';}
  if(e){e.textContent=st.eff!=null?st.eff+'%':'—';e.style.color=c;}
}

function toggleEq(sh,ri,checked){
  var s=IDX.filter(function(x){return x.sh===sh;})[0];
  var L=LIVE[sh];
  var base=true;
  if(L){var eq=L.eq.filter(function(x){return x.e;});if(eq[ri])base=eq[ri].st!=='0';}
  var k=sh+'|'+ri;
  if(checked===base){delete OV[k];}else{OV[k]=checked;}   // só guarda se difere da planilha
  saveOv();
  var lbl=document.getElementById('tl-'+ri);
  if(lbl){lbl.textContent=(checked?'OK':'FALHA')+(OV.hasOwnProperty(k)?' *':'');lbl.className='tg-lb '+(checked?'ok':'fl');}
  if(!s)return;
  updStats(s);buildSB();
  if(CUR==='dashboard')renderDash(null);
}

/* ================= EXPORT / IMPORT ================= */
function exportEdits(){
  var data={overrides:OV,edits:EDITS,exported:new Date().toISOString()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='fb_edicoes_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function exportSchoolEdits(sh){
  var schEdits={};Object.keys(EDITS).forEach(function(k){if(k.indexOf(sh+'|')===0)schEdits[k]=EDITS[k];});
  var schOv={};Object.keys(OV).forEach(function(k){if(k.indexOf(sh+'|')===0)schOv[k]=OV[k];});
  var data={sh:sh,overrides:schOv,edits:schEdits,exported:new Date().toISOString()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='fb_'+sh.replace(/[^a-z0-9]/gi,'_')+'_edicoes.json';a.click();
}
function clearSchoolEdits(sh){
  if(!confirm('Limpar todas as edições de '+sh+'?'))return;
  Object.keys(EDITS).forEach(function(k){if(k.indexOf(sh+'|')===0)delete EDITS[k];});
  Object.keys(OV).forEach(function(k){if(k.indexOf(sh+'|')===0)delete OV[k];});
  saveEdits();saveOv();buildSB();
  var name=document.getElementById('ct').textContent;
  var s=IDX.filter(function(x){return x.u===name;})[0];
  if(s)renderSchool(s.u);
}
function importEdits(){
  var inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(data.edits)Object.assign(EDITS,data.edits);
        if(data.overrides)Object.assign(OV,data.overrides);
        saveEdits();saveOv();buildSB();
        if(CUR==='dashboard')renderDash(null);
        else{var nm=document.getElementById('ct').textContent;var s=IDX.filter(function(x){return x.u===nm;})[0];if(s)renderSchool(s.u);}
        alert('Edições importadas com sucesso!');
      }catch(err){alert('Erro ao importar: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

document.addEventListener('keydown',function(e){
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('src').focus();}
  if(e.key==='Escape'&&!EDIT_MODE){document.getElementById('src').value='';filterSB('');document.getElementById('src').blur();}
});

})();
